<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Validador de Documento</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">Reconhecimento facial e OCR</p>
          <h1>Validador de documento</h1>
        </div>

        <form id="validation-form" class="form">
          <label class="field">
            <span>Foto da pessoa</span>
            <input id="img-person" name="img_person" type="file" accept="image/*" required />
          </label>

          <label class="field">
            <span>Foto do documento</span>
            <input id="img-doc" name="img_doc" type="file" accept="image/*" required />
          </label>

          <label class="field">
            <span>Threshold</span>
            <input
              id="threshold"
              name="threshold"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.70"
              required
            />
          </label>

          <button id="submit-button" type="submit">Enviar</button>
        </form>
      </section>

      <section class="panel result-panel">
        <div class="heading">
          <p class="eyebrow">Retorno da API</p>
          <h2>JSON</h2>
        </div>
        <pre id="result">Nenhuma requisicao enviada.</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
